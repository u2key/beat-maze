<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beat_echo Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00e676, #ffeb3b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 230, 118, 0.4));
        }

        p {
            color: #b0bec5;
            letter-spacing: 2px;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 2rem;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(45deg, #1e88e5, #ff4081);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 64, 129, 0.4);
        }
        button:active {
            transform: translateY(1px);
        }
        #beat-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, #2a2a4a 0%, #1a1a2e 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            margin: 40px;
            transition: transform 0.05s ease-out, background 0.05s, box-shadow 0.05s;
            position: relative;
            z-index: 10;
        }
        .beat-active {
            transform: scale(1.3);
            box-shadow: 0 0 50px rgba(30, 136, 229, 0.8), inset 0 0 20px rgba(255,255,255,0.2) !important;
        }
        .echo-ring {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #00e676;
            box-sizing: border-box;
            opacity: 1;
            transform: scale(1);
            animation: echoAnim 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes echoAnim {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
        #hit-result {
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 700;
            min-height: 2.5rem;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .perfect { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.5); }
        .good { color: #ffea00; text-shadow: 0 0 10px rgba(255, 234, 0, 0.5); }
        .bad { color: #ff5252; text-shadow: 0 0 10px rgba(255, 82, 82, 0.5); }
        #combo-display {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(229, 46, 113, 0.4));
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #combo-count {
            display: inline-block;
            transition: transform 0.1s;
        }
    </style>
</head>
<body>
    <h1>beat_echo</h1>
    <div id="combo-display">Shared Combo: <span id="combo-count">0</span></div>
    <p>Precise Web Audio API Metronome (120 BPM)</p>
    <div id="beat-circle"></div>
    <div id="hit-result">Press Space to the beat!</div>
    <button id="start-btn">Start Metronome</button>
    <script src="app.js"></script>
</body>
</html>
