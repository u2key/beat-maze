<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beat_echo Prototype</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            background-color: #1e88e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button:hover {
            background-color: #1565c0;
        }
        #beat-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #333;
            margin: 40px;
            transition: transform 0.05s ease-out, background-color 0.05s;
        }
        .beat-active {
            transform: scale(1.4);
        }
        #hit-result {
            margin-top: 20px;
            margin-bottom: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 2rem;
            text-align: center;
        }
        .perfect { color: #00e676; }
        .good { color: #ffea00; }
        .bad { color: #ff5252; }
    </style>
</head>
<body>
    <h1>beat_echo</h1>
    <p>Precise Web Audio API Metronome (120 BPM)</p>
    <div id="beat-circle"></div>
    <div id="hit-result">Press Space to the beat!</div>
    <button id="start-btn">Start Metronome</button>
    <script src="app.js"></script>
</body>
</html>
