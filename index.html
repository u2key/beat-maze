<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>beat_maze — Multiplayer Dancing Line</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a1a;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
            height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Overlay --- */
        #join-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%; animation: gradBG 12s ease infinite;
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        @keyframes gradBG {
            0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
        }
        #join-overlay h1 {
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(45deg, #00e676, #ffeb3b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0,230,118,0.5));
        }
        #join-overlay p {
            font-size: 1.4rem; color: #00e676; font-weight: 700;
            margin-top: 20px; animation: blink 1.2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* --- Song Selection View --- */
        #song-selection {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0c29; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #song-selection h2 {
            font-size: 2.5rem; margin-bottom: 25px;
            background: linear-gradient(45deg, #00e676, #ffeb3b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #songs-container {
            display: flex; flex-direction: column; gap: 12px;
            width: 320px; max-height: 45vh; overflow-y: auto;
            padding: 10px; border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .song-item {
            padding: 15px; border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.2s;
            text-align: left;
            display: flex; align-items: center; justify-content: space-between;
        }
        .song-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: #00e676;
            transform: translateX(4px);
        }
        .song-item.selected {
            background: rgba(0,230,118,0.15);
            border-color: #00e676;
        }
        .song-title { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .song-meta { font-size: 0.85rem; color: #b0bec5; margin-top: 4px; }
        
        #download-status {
            margin-top: 20px; font-weight: 700; color: #00b0ff;
            min-height: 1.5rem; font-size: 1rem;
        }

        /* --- HUD --- */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; pointer-events: none;
        }
        .hud-left, .hud-right { display: flex; gap: 15px; align-items: center; }
        .hud-item {
            background: rgba(0,0,0,0.5); border-radius: 12px;
            padding: 8px 16px; font-weight: 700; font-size: 1.1rem;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
        }
        #score-display { color: #ffeb3b; }
        #combo-display { color: #00e676; }
        #progress-display { color: #b0bec5; }

        /* --- Canvas --- */
        #game-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* --- Action Button --- */
        .action-btn {
            padding: 18px 50px; font-size: 1.3rem;
            font-family: 'Outfit', sans-serif; font-weight: 900;
            background: linear-gradient(45deg, #1e88e5, #ff4081);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s;
            margin-top: 25px;
        }
        .action-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255,64,129,0.5);
        }

        /* --- Game Over Overlay --- */
        #gameover-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 300;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #gameover-overlay h2 {
            font-size: 3.5rem; font-weight: 900; color: #ff5252;
            text-shadow: 0 0 30px rgba(255,82,82,0.6);
        }
        #gameover-overlay .final-score {
            font-size: 2rem; color: #ffeb3b; margin-top: 15px;
        }
        #gameover-overlay button {
            margin-top: 30px; padding: 15px 40px; font-size: 1.2rem;
            font-family: 'Outfit', sans-serif; font-weight: 700;
            background: linear-gradient(45deg, #1e88e5, #00e676);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- Players List --- */
        #players-list {
            position: fixed; top: 70px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 5px;
        }
        .player-tag {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.5); border-radius: 8px;
            padding: 5px 12px; font-size: 0.85rem; font-weight: 700;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
        }
        .player-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="join-overlay">
        <h1>beat_maze</h1>
        <p>TAP TO JOIN</p>
    </div>

    <!-- Song Selection Screen -->
    <div id="song-selection">
        <h2>SELECT SONG</h2>
        <div id="songs-container">
            <!-- Dynamically populated -->
        </div>
        
        <!-- Upload Form -->
        <div id="upload-container" style="margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 320px; padding: 12px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.2); border-radius: 12px; z-index: 200;">
            <div style="font-size: 0.9rem; color: #b0bec5; font-weight: 700;">Upload new MP3 (auto-generate nodes)</div>
            <label class="action-btn" style="padding: 10px 25px; font-size: 0.9rem; margin-top: 5px; cursor: pointer; background: linear-gradient(45deg, #1e88e5, #00b0ff); border-radius: 20px; text-transform: uppercase; letter-spacing: 1px;">
                Choose MP3
                <input type="file" id="audio-file-input" accept=".mp3" style="display: none;">
            </label>
        </div>
        
        <div id="download-status"></div>
        <button id="start-game-btn" class="action-btn" style="display: none;">START GAME</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="hud">
        <div class="hud-left">
            <div class="hud-item" id="score-display">Score: 0</div>
            <div class="hud-item" id="combo-display">Combo: 0</div>
        </div>
        <div class="hud-right">
            <div class="hud-item" id="progress-display">0%</div>
        </div>
    </div>

    <div id="players-list"></div>

    <div id="gameover-overlay">
        <h2>GAME OVER</h2>
        <div class="final-score" id="final-score">Score: 0</div>
        <button id="retry-btn">SELECT SONG</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
